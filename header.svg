<svg
  width="854"
  height="150"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="z-index:1;position:relative"
  viewBox="0 0 854 150"
  xml:lang="ru"
>
  <style>
    .text { 
      font-size: 50px; 
      font-weight: 700; 
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'Microsoft YaHei', sans-serif;
      letter-spacing: normal;
      fill: white;
    } 
    .text { 
      animation: fadeIn 1.2s ease-in-out forwards;  
    } 
    @keyframes fadeIn { 
      from { opacity: 0; } 
      to { opacity: 1; } 
    }
  </style>
  <defs>
    <linearGradient id="linear" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
    <mask id="waveMask">
      <rect width="854" height="150" fill="white"/>
      <path d="M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 150 L 0 150 Z" fill="black">
        <animate
          attributeName="d"
          dur="8s"
          repeatCount="indefinite"
          keyTimes="0;0.333;0.667;1"
          calcmod="spline"
          keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
          begin="0s"
          values="M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 150 L 0 150 Z;
                  M0 0L 0 95Q 213.5 110 427 90T 854 80L 854 150 L 0 150 Z;
                  M0 0L 0 115Q 213.5 85 427 115T 854 80L 854 150 L 0 150 Z;
                  M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 150 L 0 150 Z"/>
      </path>
    </mask>
  </defs>
  
  <!-- Фоновый градиент -->
  <rect width="854" height="150" fill="url(#linear)"/>
  
  <!-- Волны поверх текста с маской для эффекта потопа -->
  <g mask="url(#waveMask)">
    <rect width="854" height="150" fill="url(#linear)" opacity="0.9"/>
  </g>
  
  <!-- Анимированные волны для дополнительного эффекта -->
  <g transform="translate(427, 75) scale(1, 1) translate(-427, -75)">
    <path d="M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 0 Z" fill="white" opacity="0.3">
      <animate
        attributeName="d"
        dur="20s"
        repeatCount="indefinite"
        keyTimes="0;0.333;0.667;1"
        calcmod="spline"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        begin="0s"
        values="M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 0 Z;M0 0L 0 95Q 213.5 110 427 90T 854 80L 854 0 Z;M0 0L 0 115Q 213.5 85 427 115T 854 80L 854 0 Z;M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 0 Z">
      </animate>
    </path>
    <path d="M0 0L 0 85Q 213.5 130 427 100T 854 110L 854 0 Z" fill="white" opacity="0.3">
      <animate
        attributeName="d"
        dur="20s"
        repeatCount="indefinite"
        keyTimes="0;0.333;0.667;1"
        calcmod="spline"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        begin="-10s"
        values="M0 0L 0 85Q 213.5 130 427 100T 854 110L 854 0 Z;M0 0L 0 100Q 213.5 70 427 70T 854 90L 854 0 Z;M0 0L 0 95Q 213.5 75 427 100T 854 115L 854 0 Z;M0 0L 0 85Q 213.5 130 427 100T 854 110L 854 0 Z">
      </animate>
    </path>
  </g>
  
  <!-- Текст поверх всего, но закрывается маской -->
  <text text-anchor="middle" alignment-baseline="middle" x="50%" y="35%" class="text">Ощепков Сергей</text>
</svg>
