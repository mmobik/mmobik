<svg
  width="854"
  height="150"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="z-index:1;position:relative"
  viewBox="0 0 854 150"
  xml:lang="ru"
>
  <style>
    .text { 
      font-size: 50px; 
      font-weight: 700; 
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'Microsoft YaHei', sans-serif;
    } 
    .text { 
      animation: fadeIn 1.2s ease-in-out forwards;  
    } 
    @keyframes fadeIn { 
      from { opacity: 0; } 
      to { opacity: 1; } 
    }
    @keyframes waveLetter {
      0% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-6px) rotate(-2deg); }
      50% { transform: translateY(0px) rotate(0deg); }
      75% { transform: translateY(6px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .wave-letter {
      display: inline-block;
      animation: waveLetter 1.2s ease-in-out infinite;
      animation-delay: calc(var(--i) * 0.08s);
    }
  </style>
  <defs>
    <linearGradient id="linear" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(427, 75) scale(1, 1) translate(-427, -75)">
    <path d="M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 0 Z" fill="url(#linear)" opacity="0.4">
      <animate
        attributeName="d"
        dur="20s"
        repeatCount="indefinite"
        keyTimes="0;0.333;0.667;1"
        calcmod="spline"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        begin="0s"
        values="M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 0 Z;M0 0L 0 95Q 213.5 110 427 90T 854 80L 854 0 Z;M0 0L 0 115Q 213.5 85 427 115T 854 80L 854 0 Z;M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 0 Z">
      </animate>
    </path>
    <path d="M0 0L 0 85Q 213.5 130 427 100T 854 110L 854 0 Z" fill="url(#linear)" opacity="0.4">
      <animate
        attributeName="d"
        dur="20s"
        repeatCount="indefinite"
        keyTimes="0;0.333;0.667;1"
        calcmod="spline"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        begin="-10s"
        values="M0 0L 0 85Q 213.5 130 427 100T 854 110L 854 0 Z;M0 0L 0 100Q 213.5 70 427 70T 854 90L 854 0 Z;M0 0L 0 95Q 213.5 75 427 100T 854 115L 854 0 Z;M0 0L 0 85Q 213.5 130 427 100T 854 110L 854 0 Z">
      </animate>
    </path>
  </g>
  
  <text text-anchor="middle" alignment-baseline="middle" x="50%" y="35%" class="text" fill="white">
    <tspan x="50%" dy="0" text-anchor="middle">
      <tspan class="wave-letter" style="--i: 0">О</tspan>
      <tspan class="wave-letter" style="--i: 1">щ</tspan>
      <tspan class="wave-letter" style="--i: 2">е</tspan>
      <tspan class="wave-letter" style="--i: 3">п</tspan>
      <tspan class="wave-letter" style="--i: 4">к</tspan>
      <tspan class="wave-letter" style="--i: 5">о</tspan>
      <tspan class="wave-letter" style="--i: 6">в</tspan>
      <tspan class="wave-letter" style="--i: 7"> </tspan>
      <tspan class="wave-letter" style="--i: 8">С</tspan>
      <tspan class="wave-letter" style="--i: 9">е</tspan>
      <tspan class="wave-letter" style="--i: 10">р</tspan>
      <tspan class="wave-letter" style="--i: 11">г</tspan>
      <tspan class="wave-letter" style="--i: 12">е</tspan>
      <tspan class="wave-letter" style="--i: 13">й</tspan>
    </tspan>
  </text>
</svg>
